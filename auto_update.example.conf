# Wszystkie opcje auto-update w jednym miejscu.
#
# Adres manifestu JSON z informacja o najnowszej paczce.
# Przyklad:
# UPDATE_MANIFEST_URL="https://kazpar.pl/icecast-updater/latest.json"
UPDATE_MANIFEST_URL="https://example.com/icecast-updater/latest.json"
#
# Jak czesto timer sprawdza aktualizacje.
UPDATE_TIMER_INTERVAL="1d"
#
# Losowe opoznienie sprawdzenia (zmniejsza jednoczesne pobrania u wielu osob).
UPDATE_TIMER_RANDOM_DELAY="1h"
#
# Po jakim czasie od startu systemu wykonac sprawdzenie.
UPDATE_TIMER_ON_BOOT_SEC="20m"
#
# Czy sprawdzac aktualizacje przy starcie programu (start_updater.sh).
# 1 = tak, 0 = nie
UPDATE_CHECK_ON_START="1"
#
# Maksymalny czas (sekundy) na sprawdzenie przy starcie programu.
UPDATE_CHECK_TIMEOUT_SEC="180"
